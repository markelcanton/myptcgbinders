<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myptcgbinders</title>
    <link rel="icon" type="image/png" href="img/logo/icon.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/binders.css">
</head>
<body>
    <header>
        <h1 style="padding-left: 10px;">myptcgbinders</h1>
    </header>
    <main>
        <h1>Selecciona un binder:</h1>
        <hr size="1">
        <p>
            En esta página podrás consultar mis álbumes actualizados en tiempo real.
        </p>
        <main id="binders-container" style="background-color: #ffffff00">
            <div id="binder-book" class="binder-book"></div>

            <div class="binder-controls">
                <div class="album-select-container">
                    <span>Álbum:</span>
                    <select id="album-select">
                        <option value="json/gamegenic2x2.json" data-grid="2x2">Gamegenic (2x2)</option>
                        <option value="json/ultrapro-megagengar-2x2.json" data-grid="2x2">UltraPRO Mega-Gengar (2x2 + Jumbo)</option>
                        <option value="json/holo3x3.json" data-grid="3x3">Álbum Holo (3x3)</option>
                    </select>
                </div>

                <button id="prev-btn" class="nav-btn">◀ Anterior</button>
                <div class="page-select-container">
                    <span>Página:</span>
                    <input type="text" id="page-input" value="1">
                    <span id="total-pages-label">/ 1</span>
                </div>
                <button id="next-btn" class="nav-btn">Siguiente ▶</button>
            </div>
        </main>
    </main>
    <footer>
        <b>Creado por <a target="_blank" href="https://github.com/markelcanton/" title="https://github.com/markelcanton/">Markel Cantón</a></b>
    </footer>

    <div id="card-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modal-body" class="modal-grid"></div>
        </div>
    </div>
</body>
<script src="js/loadfade.js"></script>
<script src="js/binders.js"></script>
</html>
