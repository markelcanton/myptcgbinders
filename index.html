<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myptcgbinders</title>
    <link rel="icon" type="image/png" href="img/logo/tub.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/binders.css">
</head>
<body>
    <header>
        <h1 style="padding-left: 10px;">myptcgbinders</h1>
    </header>
    <main>
        <h1>Selecciona un binder:</h1>
        <hr size="1">
        <p>
            En esta página podrás consultar mis álbumes actualizados en tiempo real.
        </p>
    </main>
    <main id="binders-container">
        <div id="binder-book" class="binder-book">
            </div>

        <div class="binder-controls">
            <button id="prev-btn" class="nav-btn">◀ Anterior</button>
            <div class="page-select-container">
                <span>Página:</span>
                <select id="page-select"></select>
            </div>
            <button id="next-btn" class="nav-btn">Siguiente ▶</button>
        </div>
    </main>

    <footer>
        <b>Creado por <a target="_blank" href="https://github.com/markelcanton/" title="https://github.com/markelcanton/">Markel Cantón</a></b>
    </footer>

    <div id="card-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <div id="modal-body" class="modal-grid"></div>
        </div>
    </div>
</body>
<script src="js/loadfade.js"></script>
<script src="js/binders.js"></script>
</html>
